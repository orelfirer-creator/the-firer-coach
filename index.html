<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המאמן האישי שלי: The Firer Coach</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-wrapper {
            display: flex;
            flex-direction: row;
            gap: 30px;
            align-items: start;
        }

        .board-container {
            flex-shrink: 0;
        }

        #myBoard {
            width: 500px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .info-panel {
            width: 380px;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .title {
            margin: 0 0 5px 0;
            font-size: 24px;
            text-align: center;
            color: #ffffff;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }

        .status-container, .engine-container, .explanation-container {
            padding: 15px;
            background-color: #2d2d2d;
            border-radius: 5px;
        }

        .panel-label {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
            display: block;
        }

        #status {
            font-weight: bold;
            font-size: 18px;
        }

        #best-move {
            font-family: 'Roboto Mono', monospace;
            color: #4CAF50;
            font-size: 20px;
            font-weight: bold;
        }

        #depth-status {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* עיצוב כפתור ההסבר ותיבת הטקסט */
        #explain-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            display: none;
            width: 100%;
        }

        #explain-btn:hover { background-color: #45a049; }
        #explain-btn:disabled { background-color: #555; cursor: not-allowed; }

        #ai-explanation {
            font-size: 14px;
            line-height: 1.5;
            color: #fff;
            white-space: pre-wrap;
        }

        /* אזור הגדרת המפתח */
        .api-setup {
            margin-top: 10px;
            padding: 15px;
            background-color: #2a2000;
            border: 1px dashed #ffc107;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .api-setup input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 4px;
            border: none;
            box-sizing: border-box;
            font-family: monospace;
        }
        
        .api-setup button {
            background-color: #ffc107;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            #myBoard { width: 90vw; }
            .info-panel { width: 90vw; box-sizing: border-box; }
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <div class="board-container">
            <div id="myBoard"></div>
        </div>

        <div class="info-panel">
            <h1 class="title">The Firer Coach</h1>
            
            <div class="status-container">
                <span class="panel-label">סטטוס משחק</span>
                <div id="status">טוען...</div>
            </div>
            
            <div class="engine-container" id="engineStatus">
                <span class="panel-label">ניתוח המנוע (עומק 16)</span>
                <div id="best-move">אנא עשה מהלך</div>
            </div>

            <button id="explain-btn">הסבר לי את המהלך</button>
            <div class="explanation-container" id="explanation-box" style="display:none;">
                <span class="panel-label">הסבר טקטי ואסטרטגי (Gemini)</span>
                <div id="ai-explanation"></div>
            </div>

            <div class="api-setup" id="api-setup-box">
                <strong>הגדרת חיבור ל-AI:</strong> הדבק כאן את מפתח ה-API שלך. הוא נשמר רק בדפדפן שלך.
                <input type="password" id="api-key-input" placeholder="AIzaSy...">
                <button onclick="saveApiKey()">שמור מפתח</button>
            </div>
        </div>
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $bestMoveDisplay = $('#best-move');
        var $explainBtn = $('#explain-btn');
        var $explanationBox = $('#explanation-box');
        var $aiExplanation = $('#ai-explanation');
        var engine = null;
        var currentBestMove = null;

        // בדיקה אם יש מפתח שמור והסתרת התיבה
        $(document).ready(function() {
            if (localStorage.getItem('gemini_api_key')) {
                $('#api-setup-box').hide();
            }
        });

        function saveApiKey() {
            var key = $('#api-key-input').val().trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                $('#api-setup-box').slideUp();
                alert("המפתח נשמר בהצלחה בדפדפן שלך!");
            }
        }

        // טעינת מנוע סטוקפיש
        fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js')
            .then(function(response) { return response.text(); })
            .then(function(text) {
                var blob = new Blob([text], {type: 'application/javascript'});
                engine = new Worker(URL.createObjectURL(blob));
                
                engine.onmessage = function(event) {
                    var line = event.data;
                    
                    if (line === 'readyok') {
                        $bestMoveDisplay.html('המנוע מוכן!');
                    }
                    
                    if (line.includes('bestmove')) {
                        currentBestMove = line.split(' ')[1];
                        $bestMoveDisplay.html(currentBestMove);
                        $explainBtn.show(); 
                    }
                };
                
                engine.postMessage('uci');
                setTimeout(function() { engine.postMessage('isready'); }, 500);
            });

        function askEngine() {
            if (engine) {
                $explainBtn.hide(); 
                $explanationBox.hide();
                $bestMoveDisplay.html('מחשב...');
                engine.postMessage('position fen ' + game.fen());
                engine.postMessage('go depth 16');
            }
        }

        // פונקציית כפתור ההסבר שמדברת עם ג'מיני
        $explainBtn.on('click', function() {
            var apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                alert("אנא הכנס מפתח API בתיבה למטה ושמור אותו קודם.");
                $('#api-setup-box').slideDown();
                return;
            }

            if (!currentBestMove) return;

            // שינוי תצוגה לטעינה
            $explainBtn.prop('disabled', true).text('מנתח עמדה...');
            $explanationBox.slideDown();
            $aiExplanation.html('<i>Gemini חושב על ההסבר...</i>');

            var promptText = "אני שחקן שחמט ברמה של 1440. המצב בלוח הוא:\n" + 
                             game.fen() + "\n" + 
                             "מנוע Stockfish המליץ על המהלך: " + currentBestMove + ". " +
                             "תסביר לי ב-2-3 משפטים בעברית פשוטה מה הרעיון האסטרטגי או הטקטי מאחורי המהלך הזה ועל אילו איומים הוא עונה?";

            var apiUrl = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + apiKey;

            fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            })
            .then(response => response.json())
            .then(data => {
                $explainBtn.prop('disabled', false).text('הסבר לי את המהלך');
                if (data.candidates && data.candidates.length > 0) {
                    var text = data.candidates[0].content.parts[0].text;
                    // החלפת ירידות שורה רגילות לתגיות HTML כדי שזה יראה טוב
                    text = text.replace(/\n/g, '<br>');
                    // החלפת כוכביות להדגשה
                    text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    $aiExplanation.html(text);
                } else {
                    $aiExplanation.html('<span style="color:red;">שגיאה בקבלת התשובה. ודא שהמפתח תקין.</span>');
                }
            })
            .catch(error => {
                $explainBtn.prop('disabled', false).text('הסבר לי את המהלך');
                $aiExplanation.html('<span style="color:red;">שגיאת תקשורת: ' + error.message + '</span>');
            });
        });

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();
            askEngine();
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = game.turn() === 'b' ? 'שחור' : 'לבן';

            if (game.in_checkmate()) statusHTML = 'מט ל' + moveColor + '!';
            else if (game.in_draw()) statusHTML = 'תיקו.';
            else {
                statusHTML = 'תור: ' + moveColor;
                if (game.in_check()) statusHTML += ', <span style="color:#ff5252;">שח!</span>';
            }
            $status.html(statusHTML);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();
    </script>

</body>
</html>
