<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המאמן האישי שלי</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body style="font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px;">

    <h2>"המאמן האישי שלי"</h2>
    
    <div id="myBoard" style="width: 400px;"></div>
    
    <div style="margin-top: 20px; font-weight: bold; font-size: 18px;" id="status"></div>
    
    <div style="margin-top: 15px; padding: 10px; background-color: #f0f0f0; border-radius: 5px; width: 380px; text-align: center; color: #333;" id="engineStatus">
        טוען את מנוע Stockfish...
    </div>

    <script>
        var board = null;
        var game = new Chess();
        var $status = $('#status');
        var $engineStatus = $('#engineStatus');
        var engine = null;

        // טעינת מנוע סטוקפיש בצורה שעוקפת חסימות דפדפן
        fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.0/stockfish.js')
            .then(function(response) { return response.text(); })
            .then(function(text) {
                var blob = new Blob([text], {type: 'application/javascript'});
                engine = new Worker(URL.createObjectURL(blob));
                
                // האזנה לתשובות מהמנוע
                engine.onmessage = function(event) {
                    var line = event.data;
                    
                    // כשהמנוע מוכן לפעולה
                    if (line === 'readyok') {
                        $engineStatus.html('המנוע מוכן! עשה מהלך כדי לקבל ניתוח.');
                    }
                    
                    // כשהמנוע מוצא את המהלך הכי טוב
                    if (line.includes('bestmove')) {
                        var bestMove = line.split(' ')[1]; // שולף את המהלך מהטקסט
                        $engineStatus.html('המלצת המנוע (Stockfish): המהלך הטוב ביותר הוא <strong>' + bestMove + '</strong>');
                    }
                };
                
                engine.postMessage('uci'); // אתחול המנוע
                setTimeout(function() { engine.postMessage('isready'); }, 500);
            });

        // פונקציה שמפעילה את המנוע לחשוב על העמדה הנוכחית
        function askEngine() {
            if (engine) {
                $engineStatus.html('המנוע חושב...');
                engine.postMessage('position fen ' + game.fen());
                engine.postMessage('go depth 10'); // עומק חישוב (10 זה מהיר וטוב לדפדפן)
            }
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();
            askEngine(); // קורא למנוע אחרי כל מהלך תקין
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var statusHTML = '';
            var moveColor = game.turn() === 'b' ? 'שחור' : 'לבן';

            if (game.in_checkmate()) statusHTML = 'מט ל' + moveColor + '!';
            else if (game.in_draw()) statusHTML = 'תיקו.';
            else {
                statusHTML = 'תור: ' + moveColor;
                if (game.in_check()) statusHTML += ', שח!';
            }
            $status.html(statusHTML);
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('myBoard', config);
        updateStatus();
    </script>

</body>
</html>
